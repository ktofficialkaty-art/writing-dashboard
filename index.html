<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作练习 · 教师后台</title>
<style>
:root{
  --plum-900:#3b2454;
  --plum-700:#5e3a86;
  --plum-600:#724aa3;
  --plum-500:#8b63c2;
  --plum-400:#a685d4;
  --plum-200:#d8c7ee;
  --plum-100:#ece2f8;
  --plum-50:#f6f1fc;
  --lilac:#efe7fb;
  --paper:#fbf9fe;
  --ink:#2c2435;
  --ink-soft:#5b5168;
  --accent-rose:#c0568a;
  --accent-amber:#d8932f;
  --accent-teal:#3f9d92;
  --line:#e4d9f2;
  --shadow:0 10px 40px -18px rgba(91,58,134,.45);
  --shadow-sm:0 4px 18px -10px rgba(91,58,134,.4);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(circle at 12% 8%, #f0e6fb 0%, transparent 42%),
    radial-gradient(circle at 88% 18%, #f7eefb 0%, transparent 40%),
    var(--paper);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
header.top{
  position:sticky;top:0;z-index:20;
  background:rgba(251,249,254,.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.top-inner{max-width:1080px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.brand{font-weight:800;font-size:1.05rem;color:var(--plum-700);display:flex;align-items:center;gap:10px;white-space:nowrap;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--plum-500),var(--accent-rose));}
.livedot{width:8px;height:8px;border-radius:50%;background:var(--accent-teal);margin-left:auto;flex:none;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.livelabel{font-size:.8rem;color:var(--ink-soft);}

.session-nav{display:flex;gap:8px;}
.session-tab{background:none;border:1px solid var(--line);border-radius:999px;padding:6px 18px;font-size:.85rem;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:"Noto Sans SC",sans-serif;transition:.15s;}
.session-tab:hover{background:var(--plum-50);}
.session-tab.active{background:var(--plum-600);color:#fff;border-color:var(--plum-600);}

.wrap{max-width:1080px;margin:0 auto;padding:26px;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);}
.stat-card .num{font-size:1.7rem;font-weight:800;color:var(--plum-700);}
.stat-card .lbl{font-size:.8rem;color:var(--ink-soft);margin-top:2px;}

.search-row{display:flex;gap:10px;margin-bottom:18px;}
#searchInput{flex:1;padding:11px 16px;border:1px solid var(--line);border-radius:999px;font-size:.92rem;outline:none;background:#fff;}
#searchInput:focus{border-color:var(--plum-500);}

.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.student-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s;}
.student-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.student-card .name{font-weight:800;font-size:1.02rem;color:var(--plum-900);margin-bottom:8px;}
.student-card .meta{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--ink-soft);}
.badge{font-weight:800;padding:3px 10px;border-radius:999px;font-size:.82rem;}
.badge.good{background:#e3f3ef;color:var(--accent-teal);}
.badge.mid{background:#faf0de;color:var(--accent-amber);}
.badge.low{background:#f8e9ef;color:var(--accent-rose);}
.badge.neutral{background:var(--plum-100);color:var(--plum-700);}
.student-card .recent{margin-top:6px;font-size:.76rem;color:var(--ink-soft);}

.empty{text-align:center;padding:60px 0;color:var(--ink-soft);}

#detailView{display:none;}
.back-btn{background:none;border:1px solid var(--line);border-radius:999px;padding:8px 18px;font-size:.85rem;color:var(--plum-700);cursor:pointer;margin-bottom:18px;font-weight:700;}
.back-btn:hover{background:var(--plum-50);}
.delete-btn{background:#fff;border:1px solid var(--accent-rose);border-radius:999px;padding:8px 16px;font-size:.85rem;color:var(--accent-rose);cursor:pointer;font-weight:700;font-family:"Noto Sans SC",sans-serif;}
.delete-btn:hover{background:#f8e9ef;}
.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.detail-head h2{color:var(--plum-900);font-size:1.3rem;}
.detail-stats{display:flex;gap:18px;font-size:.86rem;color:var(--ink-soft);}
.detail-stats b{color:var(--plum-700);}

.attempt{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.attempt-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:12px;}
.attempt-head:hover{background:var(--plum-50);}
.attempt-ex{font-weight:700;color:var(--plum-700);font-size:.9rem;}
.attempt-time{font-size:.78rem;color:var(--ink-soft);}
.attempt-score{font-weight:800;font-size:.88rem;flex:none;}
.attempt-body{display:none;padding:0 16px 14px;border-top:1px solid var(--line);}
.attempt.open .attempt-body{display:block;}
.wrong-item{padding:10px 0;border-bottom:1px dashed var(--line);font-size:.85rem;}
.wrong-item:last-child{border-bottom:none;}
.wrong-item .q{color:var(--ink);margin-bottom:4px;}
.wrong-item .ans-row{display:flex;gap:16px;flex-wrap:wrap;}
.wrong-item .ans-row span{font-size:.82rem;}
.wrong-item .stu{color:var(--accent-rose);}
.wrong-item .corr{color:var(--accent-teal);font-style:italic;}
.no-wrong{padding:14px 0;color:var(--accent-teal);font-size:.86rem;font-weight:700;}
.sentence-block{padding:12px 0;}
.sentence-block .sline{font-size:.85rem;margin-bottom:8px;line-height:1.6;}
.sentence-block .sline b{color:var(--ink-soft);font-weight:700;margin-right:2px;}
.sentence-block .stu{color:var(--accent-rose);}
.sentence-block .corr{color:var(--accent-teal);font-style:italic;}

.section-label{font-weight:800;color:var(--plum-700);font-size:.95rem;margin:18px 0 10px;}
.essay-card{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.essay-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;gap:12px;flex-wrap:wrap;}
.essay-title{font-weight:700;color:var(--plum-700);font-size:.9rem;}
.essay-meta{font-size:.78rem;color:var(--ink-soft);margin-top:2px;}
.essay-body{padding:0 16px 16px;border-top:1px solid var(--line);}
.essay-content{background:var(--plum-50);border-radius:10px;padding:12px 14px;font-size:.88rem;line-height:1.7;color:var(--ink);white-space:pre-wrap;margin:12px 0;max-height:260px;overflow-y:auto;}
.essay-empty{padding:14px 0;color:var(--ink-soft);font-size:.85rem;font-style:italic;}
.essay-feedback-form{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-top:10px;}
.essay-feedback-form textarea{flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:.85rem;font-family:"Noto Sans SC",sans-serif;resize:vertical;min-height:60px;}
.essay-feedback-form textarea:focus{outline:none;border-color:var(--plum-500);}
.essay-score-input{width:70px;padding:9px 8px;border:1px solid var(--line);border-radius:10px;font-size:.85rem;text-align:center;}
.essay-score-input:focus{outline:none;border-color:var(--plum-500);}
.essay-push-btn{background:var(--plum-600);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:"Noto Sans SC",sans-serif;white-space:nowrap;}
.essay-push-btn:hover{filter:brightness(1.08);}
.essay-pushed-flag{font-size:.78rem;color:var(--accent-teal);font-weight:700;opacity:0;transition:.3s;margin-left:8px;}
.essay-pushed-flag.show{opacity:1;}
.essay-fb-existing{font-size:.78rem;color:var(--ink-soft);margin-top:8px;}

.loading{text-align:center;padding:60px 0;color:var(--ink-soft);}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="dot"></span>写作练习 · 教师后台</div>
    <div class="session-nav" id="sessionNav">
      <button class="session-tab active" data-session="s1">S1</button>
      <button class="session-tab" data-session="s2">S2</button>
      <button class="session-tab" data-session="s3">S3</button>
      <button class="session-tab" data-session="s4">S4</button>
      <button class="session-tab" data-session="s5">S5</button>
      <button class="session-tab" data-session="s6">S6</button>
    </div>
    <span class="livedot"></span><span class="livelabel">实时同步中</span>
  </div>
</header>

<div class="wrap">

  <div id="listView">
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="statStudents">0</div><div class="lbl">练习学生数</div></div>
      <div class="stat-card"><div class="num" id="statAttempts">0</div><div class="lbl">总练习次数</div></div>
      <div class="stat-card"><div class="num" id="statAccuracy">0%</div><div class="lbl">本session平均正确率</div></div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="🔍 搜索学生姓名">
    </div>

    <div id="loadingTip" class="loading">正在连接数据库…</div>
    <div id="studentList" class="student-grid"></div>
    <div id="emptyState" class="empty" style="display:none">暂无学生练习数据，等学生开始做练习后会自动出现在这里</div>
  </div>

  <div id="detailView">
    <button class="back-btn" id="backBtn">← 返回学生列表</button>
    <div class="detail-head">
      <h2 id="detailName"></h2>
      <div class="detail-stats">
        <span>练习次数：<b id="detailCount"></b></span>
        <span>总体正确率：<b id="detailAcc"></b></span>
        <button class="delete-btn" id="deleteStudentBtn">删除该学生记录</button>
      </div>
    </div>
    <div id="essaySection" style="display:none;">
      <div class="section-label">✍️ 写作作业</div>
      <div id="essayList"></div>
    </div>
    <div class="section-label" id="attemptLabel" style="display:none;">📝 客观题练习记录</div>
    <div id="attemptList"></div>
  </div>

</div>

<script>
const SESSION_CONFIG={
  s1:{
    path:'s1_attempts',
    essayPath:'s1_essays',
    excludePrefixes:['S4__','S5__','S6__'],
    essayLabels:{
      hw_household:'作业① · Household 折线图',
      hw_ukphone:'作业② · UK Telephone Calls 柱状图',
      hw_car:'作业③ · Car 柱状图'
    },
    exLabel:a=>{
      const M={
        ex1_up:'练习1 · 上升类动词',
        ex1_down:'练习1 · 下降类动词',
        ex1_other:'练习1 · 其他趋势动词',
        ex2_sort:'练习2 · 词性归类',
        ex3:'练习3 · 选择正确词性',
        ex4:'练习4 · 时态填空'
      };
      if(a.exercise==='ex5')return '练习5 · 句式转换 · 第'+((a.idx!=null?a.idx:0)+1)+'句';
      return M[a.exercise]||a.exercise;
    }
  },
  s2:{
    path:'s2_attempts',
    essayPath:'s2_essays',
    essayLabels:{
      hw_household:'作业一① · Household 折线图',
      hw_ukphone:'作业一② · UK Telephone Calls 柱状图',
      hw_car:'作业一③ · Car 柱状图',
      hw_water_essay:'作业二 · 大作文（免费供水题）'
    },
    exLabel:a=>{
      const M={
        fill_reach:'词汇 · 达到某个数值',
        fill_rise_to:'词汇 · 上升至某个数值',
        fill_fall_to:'词汇 · 下降至某个数值',
        fill_by:'词汇 · 变化了某个幅度',
        fill_exceed:'词汇 · 超过/低于',
        fill_approx:'词汇 · 大约/接近',
        fill_s2_gA:'S2练习A · 起点描述',
        fill_s2_gB:'S2练习B · 终点描述',
        fill_s2_gC:'S2练习C · 起点终点最高最低',
        fill_s2_gD:'S2练习D · 整体变化描述',
        sort_idea1:'排序 · Idea1例句重组'
      };
      return M[a.exercise]||a.exercise;
    }
  },
  s3:{
    path:'s3_attempts',
    essayPath:'s3_essays',
    essayLabels:{
      hw_t5_j7:'作业 · Task1全文写作（剑7 Test1）',
      hw_t5_j13:'作业 · Task1全文写作（剑13 Test3）',
      hw_t5_task2:'Task2 全文写作（语言障碍题）'
    },
    exLabel:a=>{
      const M={
        'vex-t3main':'Pie Chart主体段 · 综合填空',
        'vex-a':'表达填空（超过/明显/占比等）',
        'vex-b':'That of 句式改写',
        'vex-c':'词汇精准选择（饼图 vs 柱状图）',
        'vex-d':'程度词与一致性填空',
        'vex-e':'数字自然衔接句式转换',
        'bp2_reorder':'主体段思路 · BP2句子重组',
        'conclusion_quiz':'结尾段 · 最佳结尾选择'
      };
      return M[a.exercise]||a.exercise;
    }
  },
  s4:{
    path:'s1_attempts',
    essayPath:'s1_essays',
    keyPrefix:'S4__',
    essayLabels:{
      hw_dance:'Task 1 全文写作 · 舞蹈课程',
      hw_police:'Task 1 全文写作 · 警察预算',
      hw_bigessay:'Task 2 全文写作 · 毕业后与父母同住'
    },
    exLabel:a=>{
      const M={
        practice_g1:'小作文句式综合 · 极值与对比表达',
        practice_g2:'小作文句式综合 · 比较级与 tend to / those',
        practice_g3:'小作文句式综合 · 极个别与升降表达',
        dragsort_adv2:'Task 2 逻辑训练 · Advantage 2 排序',
        dragsort_bp3:'Task 2 逻辑训练 · 让步反驳段排序',
        classify_bigessay:'Task 2 逻辑训练 · 推理分类'
      };
      if((a.exercise||'').startsWith('logic_tf_')){
        const n=Number((a.exercise||'').replace('logic_tf_tf_',''))+1;
        return '图表逻辑判断 · 第'+n+'题';
      }
      return M[a.exercise]||a.exercise;
    }
  },
  s5:{
    path:'s1_attempts',
    essayPath:'s1_essays',
    keyPrefix:'S5__',
    essayLabels:{
      hw_harbour:'Task 1 全文写作 · Porth Harbour 地图题',
      hw_competition_cooperation:'Task 2 全文写作 · 竞争与合作'
    },
    exLabel:a=>{
      const M={
        chunk_competition:'Task 2 语块排序 · Competition',
        chunk_cooperation:'Task 2 语块排序 · Cooperation',
        conclusion_fill:'Task 2 结尾段填空',
        map_mcq:'地图题 · 核心知识选择',
        passive_writing:'地图题 · 被动语态句子写作',
        essay_match:'Task 2 论证表达中英配对'
      };
      return M[a.exercise]||a.exercise;
    }
  },
  s6:{
    path:'s1_attempts',
    essayPath:'s1_essays',
    keyPrefix:'S6__',
    essayLabels:{
      hw_s6_flowchart:'Task 1 全文写作 · Instant noodles 流程图',
      hw_s6_task2_behavior:'Task 2 全文写作 · Student behavior'
    },
    exLabel:a=>{
      const M={
        t1_observation:'S6 Task 1 · 观察流程',
        t1_thinking:'S6 Task 1 · 写作思路',
        t1_passive:'S6 Task 1 · 被动语态动词',
        t2_analysis:'S6 Task 2 · 审题选择',
        t2_classify:'S6 Task 2 · 上下位词分类',
        t2_argument:'S6 Task 2 · 论证引导选择'
      };
      return a.label||M[a.exercise]||a.exercise;
    }
  }
};

let SESSION_DATA={s1:{},s2:{},s3:{},s4:{},s5:{},s6:{}};
let ESSAY_DATA={s1:{},s2:{},s3:{},s4:{},s5:{},s6:{}};
let currentSession='s1';
let currentStudent=null;
const sanitizeKey=s=>s.replace(/[.#$\[\]\/]/g,'_');
const escapeHTML=s=>String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
window.normalizeEssayContent=s=>{
  const addBlockBreaks=value=>value
    .replace(/\r\n?/g,'\n')
    .replace(/<\s*br\b[^>]*>/gi,'\n')
    .replace(/<\s*\/\s*(p|font)\s*>\s*<\s*(p|font)\b[^>]*>/gi,'\n\n')
    .replace(/<\s*\/\s*(div|li|h[1-6])\s*>\s*<\s*(div|li|h[1-6])\b[^>]*>/gi,'\n')
    .replace(/<\s*(div|p|li|h[1-6])\b[^>]*>/gi,'\n')
    .replace(/<\s*\/\s*(div|p|li|h[1-6])\s*>/gi,'');
  const stripFormatting=value=>{
    const template=document.createElement('template');
    template.innerHTML=value;
    template.content.querySelectorAll('script,style').forEach(el=>el.remove());
    return template.content.textContent||'';
  };
  let text=stripFormatting(addBlockBreaks(String(s??'')));
  text=stripFormatting(addBlockBreaks(text));
  return text
    .replace(/\u00a0/g,' ')
    .replace(/\n[ \t]*\n[ \t]*\n+/g,'\n\n')
    .replace(/^\n+|\n+$/g,'');
};

const accClass=p=>p>=80?'good':(p>=50?'mid':'low');

const overall=attempts=>{
  let c=0,t=0;
  attempts.forEach(a=>{c+=(a.correct||0);t+=(a.total||0);});
  return t?Math.round(c/t*100):0;
};

function renderStats(){
  const data=SESSION_DATA[currentSession];
  const essayData=ESSAY_DATA[currentSession]||{};
  const allNames=new Set([...Object.keys(data),...Object.keys(essayData)]);
  let totalAttempts=0,c=0,t=0;
  Object.keys(data).forEach(n=>{
    data[n].forEach(a=>{totalAttempts++;c+=(a.correct||0);t+=(a.total||0);});
  });
  document.getElementById('statStudents').textContent=allNames.size;
  document.getElementById('statAttempts').textContent=totalAttempts;
  document.getElementById('statAccuracy').textContent=(t?Math.round(c/t*100):0)+'%';
}

function renderList(filter){
  filter=(filter||'').trim();
  const data=SESSION_DATA[currentSession];
  const essayData=ESSAY_DATA[currentSession]||{};
  const cfg=SESSION_CONFIG[currentSession];
  const allNames=new Set([...Object.keys(data),...Object.keys(essayData)]);
  const container=document.getElementById('studentList');
  const empty=document.getElementById('emptyState');
  const names=[...allNames].filter(n=>n.includes(filter));
  container.innerHTML='';
  if(names.length===0){
    empty.style.display='block';
    empty.textContent=allNames.size===0?'暂无学生练习数据，等学生开始做练习后会自动出现在这里':'没有匹配的学生姓名';
    return;
  }
  empty.style.display='none';
  const lastTs=n=>{
    const a=(data[n]&&data[n][0])?data[n][0].ts||0:0;
    let e=0;
    if(essayData[n])Object.values(essayData[n]).forEach(v=>{if(v&&v.updatedAt)e=Math.max(e,v.updatedAt);});
    return Math.max(a,e);
  };
  names.sort((a,b)=>lastTs(b)-lastTs(a));
  names.forEach(n=>{
    const attempts=data[n]||[];
    const essays=essayData[n]||{};
    const essayCount=Object.keys(essays).filter(k=>essays[k]&&essays[k].content).length;
    const acc=overall(attempts);
    const last=attempts[0];
    const card=document.createElement('div');
    card.className='student-card';
    const rightBadge=attempts.length
      ? `<span class="badge ${accClass(acc)}">${acc}%</span>`
      : (cfg.essayLabels?`<span class="badge neutral">✍️ ${essayCount}篇</span>`:`<span class="badge neutral">-</span>`);
    const leftText=cfg.essayLabels
      ? `客观题 ${attempts.length} 次${essayCount?(' · 作文 '+essayCount+' 篇'):''}`
      : `练习 ${attempts.length} 次`;
    const recentTs=lastTs(n);
    const recentStr=last&&last.dateStr?last.dateStr:(essays&&Object.values(essays).find(v=>v&&v.updatedDateStr)?Object.values(essays).find(v=>v&&v.updatedDateStr).updatedDateStr:'-');
    card.innerHTML=`
      <div class="name">${n}</div>
      <div class="meta">
        <span>${leftText}</span>
        ${rightBadge}
      </div>
      <div class="recent">最近一次：${recentStr}</div>
    `;
    card.addEventListener('click',()=>openDetail(n));
    container.appendChild(card);
  });
}

function renderEssaySection(name){
  const cfg=SESSION_CONFIG[currentSession];
  const essaySection=document.getElementById('essaySection');
  const attemptLabel=document.getElementById('attemptLabel');
  if(!cfg.essayLabels){
    essaySection.style.display='none';
    attemptLabel.style.display='none';
    return;
  }
  essaySection.style.display='block';
  attemptLabel.style.display='block';
  const essays=ESSAY_DATA[currentSession][name]||{};
  const list=document.getElementById('essayList');
  list.innerHTML='';
  Object.keys(cfg.essayLabels).forEach(key=>{
    const label=cfg.essayLabels[key];
    const data=essays[key];
    const card=document.createElement('div');
    card.className='essay-card';
    if(!data||!data.content){
      card.innerHTML=`
        <div class="essay-head">
          <div><div class="essay-title">${label}</div><div class="essay-meta">尚未提交</div></div>
        </div>`;
      list.appendChild(card);
      return;
    }
    const existingComment=data.teacherComment||'';
    const existingScore=data.teacherScore||'';
    const fbExisting=data.feedbackDateStr?`<div class="essay-fb-existing">上次反馈：${data.feedbackDateStr}</div>`:'';
    card.innerHTML=`
      <div class="essay-head">
        <div>
          <div class="essay-title">${label}</div>
          <div class="essay-meta">字数 ${data.wordCount||0} · 最后保存 ${data.updatedDateStr||''}</div>
        </div>
      </div>
      <div class="essay-body">
        <div class="essay-content">${escapeHTML(window.normalizeEssayContent(data.content))}</div>
        <div class="essay-feedback-form">
          <textarea class="fb-comment-input" placeholder="写一句简短点评…">${existingComment.replace(/</g,'&lt;')}</textarea>
          <input class="essay-score-input" type="text" placeholder="评分" value="${(existingScore+'').replace(/"/g,'&quot;')}">
          <button class="essay-push-btn">推送反馈</button>
          <span class="essay-pushed-flag">已推送 ✓</span>
        </div>
        ${fbExisting}
      </div>
    `;
    const btn=card.querySelector('.essay-push-btn');
    const commentInput=card.querySelector('.fb-comment-input');
    const scoreInput=card.querySelector('.essay-score-input');
    const flag=card.querySelector('.essay-pushed-flag');
    btn.addEventListener('click',()=>{
      pushEssayFeedback(currentSession,name,key,commentInput.value.trim(),scoreInput.value.trim(),flag);
    });
    list.appendChild(card);
  });
}

function pushEssayFeedback(session,studentName,essayKey,comment,score,flagEl){
  try{
    if(typeof firebase==='undefined'||!firebase.apps||!firebase.apps.length)return;
    const cfg=SESSION_CONFIG[session];
    const safeName=(cfg.keyPrefix||'')+sanitizeKey(studentName);
    firebase.database().ref(cfg.essayPath+'/'+safeName+'/'+essayKey).update({
      teacherComment:comment,
      teacherScore:score,
      feedbackAt:Date.now(),
      feedbackDateStr:new Date().toLocaleString('zh-CN')
    }).then(()=>{
      if(flagEl){flagEl.classList.add('show');setTimeout(()=>flagEl.classList.remove('show'),1800);}
    }).catch(e=>{alert('推送失败：'+e.message);});
  }catch(e){alert('推送出错：'+e.message);}
}

function rawAttemptDetails(a){
  const rows=[];
  if(a.answer!==undefined)rows.push(['学生提交',Array.isArray(a.answer)?a.answer.join(' → '):String(a.answer)]);
  if(a.studentAnswer!==undefined)rows.push(['学生答案',a.studentAnswer]);
  if(a.given!==undefined)rows.push(['学生答案',a.given]);
  if(a.accuracy!==undefined)rows.push(['正确率',a.accuracy+'%']);
  if(a.kind!==undefined)rows.push(['类型',a.kind]);
  if(!rows.length)return '';
  return rows.map(([k,v])=>`
    <div class="wrong-item">
      <div class="q">${escapeHTML(k)}</div>
      <div class="ans-row"><span class="stu">${escapeHTML(v)}</span></div>
    </div>`).join('');
}

function openDetail(name){
  currentStudent=name;
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  renderDetail(name);
}

function renderDetail(name){
  const attempts=SESSION_DATA[currentSession][name]||[];
  document.getElementById('detailName').textContent=name;
  document.getElementById('detailCount').textContent=attempts.length;
  document.getElementById('detailAcc').textContent=overall(attempts)+'%';
  renderEssaySection(name);
  const list=document.getElementById('attemptList');
  list.innerHTML='';
  const exLabel=SESSION_CONFIG[currentSession].exLabel;
  attempts.forEach((a)=>{
    const isUngraded=a.type==='ungraded';
    const wrap=document.createElement('div');
    wrap.className='attempt';
    let scoreHtml,bodyHtml;
    if(isUngraded){
      scoreHtml=`<div class="attempt-score badge neutral">已完成</div>`;
      bodyHtml=`
        <div class="sentence-block">
          <div class="sline"><b>原句：</b>${(a.prompt||'').replace(/</g,'&lt;')}</div>
          <div class="sline stu"><b>学生改写：</b>${(a.studentAnswer||'(空)').replace(/</g,'&lt;')}</div>
          <div class="sline corr"><b>参考答案：</b>${(a.referenceAnswer||'').replace(/</g,'&lt;')}</div>
        </div>`;
    }else{
      const wrong=a.wrong||[];
      const details=a.details||[];
      const acc=a.total?Math.round((a.correct/a.total)*100):0;
      scoreHtml=`<div class="attempt-score badge ${accClass(acc)}">${a.correct}/${a.total} · ${acc}%</div>`;
      bodyHtml=details.length
        ? details.map(w=>`
            <div class="wrong-item">
              <div class="q">${(w.question||w.q||'').replace(/</g,'&lt;')}</div>
              <div class="ans-row">
                <span class="stu">学生答案：${(w.studentAnswer||w.given||'(空)').replace(/</g,'&lt;')}</span>
                <span class="corr">正确答案：${(w.correctAnswer||w.answer||'').replace(/</g,'&lt;')}</span>
                <span class="${w.correct?'corr':'stu'}">${w.correct?'正确':'需订正'}</span>
              </div>
            </div>`).join('')
        : (wrong.length
          ? wrong.map(w=>`
              <div class="wrong-item">
                <div class="q">${(w.question||w.q||'').replace(/</g,'&lt;')}</div>
                <div class="ans-row">
                  <span class="stu">学生答案：${(w.studentAnswer||w.given||'(空)').replace(/</g,'&lt;')}</span>
                  <span class="corr">正确答案：${(w.correctAnswer||w.answer||'').replace(/</g,'&lt;')}</span>
                </div>
              </div>`).join('')
          : (rawAttemptDetails(a)||(
            Number(a.correct)===Number(a.total)
              ? '<div class="no-wrong">✓ 本次全部正确，没有错题</div>'
              : '<div class="no-wrong">本次已记录总分；该练习未保存逐题错题明细。</div>')));
    }
    wrap.innerHTML=`
      <div class="attempt-head">
        <div>
          <div class="attempt-ex">${exLabel(a)}</div>
          <div class="attempt-time">${a.dateStr||''}</div>
        </div>
        ${scoreHtml}
      </div>
      <div class="attempt-body">${bodyHtml}</div>
    `;
    wrap.querySelector('.attempt-head').addEventListener('click',()=>wrap.classList.toggle('open'));
    list.appendChild(wrap);
  });
}

document.getElementById('backBtn').addEventListener('click',()=>{
  currentStudent=null;
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='block';
});

document.getElementById('searchInput').addEventListener('input',e=>renderList(e.target.value));

document.getElementById('deleteStudentBtn').addEventListener('click',()=>{
  if(!currentStudent)return;
  const cfg=SESSION_CONFIG[currentSession];
  const safeName=(cfg.keyPrefix||'')+sanitizeKey(currentStudent);
  const msg='确定删除「'+currentStudent+'」在 '+currentSession.toUpperCase()+' 的所有练习和作文记录吗？此操作不能撤销。';
  if(!confirm(msg))return;
  if(typeof firebase==='undefined'||!firebase.apps||!firebase.apps.length){alert('Firebase 未连接，暂时无法删除。');return;}
  const jobs=[firebase.database().ref(cfg.path+'/'+safeName).remove()];
  if(cfg.essayPath)jobs.push(firebase.database().ref(cfg.essayPath+'/'+safeName).remove());
  Promise.all(jobs).then(()=>{
    currentStudent=null;
    document.getElementById('detailView').style.display='none';
    document.getElementById('listView').style.display='block';
  }).catch(e=>alert('删除失败：'+e.message));
});

document.querySelectorAll('.session-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.dataset.session===currentSession)return;
    currentSession=btn.dataset.session;
    document.querySelectorAll('.session-tab').forEach(b=>b.classList.toggle('active',b===btn));
    currentStudent=null;
    document.getElementById('detailView').style.display='none';
    document.getElementById('listView').style.display='block';
    document.getElementById('searchInput').value='';
    renderStats();
    renderList('');
  });
});

function attachListener(){
  try{
    if(typeof firebase==='undefined'||!firebase.apps||!firebase.apps.length){
      document.getElementById('loadingTip').textContent='Firebase 未能初始化，请检查网络连接';
      return;
    }
    Object.keys(SESSION_CONFIG).forEach(sessKey=>{
      const cfg=SESSION_CONFIG[sessKey];
      firebase.database().ref(cfg.path).on('value',snap=>{
        const val=snap.val()||{};
        const data={};
        Object.keys(val).forEach(key=>{
          if(cfg.keyPrefix&&!key.startsWith(cfg.keyPrefix))return;
          if(cfg.excludePrefixes&&cfg.excludePrefixes.some(prefix=>key.startsWith(prefix)))return;
          const raw=val[key]||{};
          const attempts=Object.values(raw).sort((x,y)=>(y.ts||0)-(x.ts||0));
          const displayName=(attempts[0]&&attempts[0].name)?attempts[0].name:key;
          data[displayName]=attempts;
        });
        SESSION_DATA[sessKey]=data;
        document.getElementById('loadingTip').style.display='none';
        if(sessKey===currentSession){
          renderStats();
          renderList(document.getElementById('searchInput').value);
          if(currentStudent&&SESSION_DATA[currentSession][currentStudent])renderDetail(currentStudent);
        }
      },err=>{
        document.getElementById('loadingTip').textContent='读取数据失败：'+err.message;
      });
      if(cfg.essayPath){
        firebase.database().ref(cfg.essayPath).on('value',snap=>{
          const val=snap.val()||{};
          const data={};
          Object.keys(val).forEach(safeKey=>{
            if(cfg.keyPrefix&&!safeKey.startsWith(cfg.keyPrefix))return;
            if(cfg.excludePrefixes&&cfg.excludePrefixes.some(prefix=>safeKey.startsWith(prefix)))return;
            const essays=val[safeKey]||{};
            let displayName=safeKey;
            Object.keys(essays).forEach(ek=>{ if(essays[ek]&&essays[ek].name) displayName=essays[ek].name; });
            data[displayName]=essays;
          });
          ESSAY_DATA[sessKey]=data;
          if(sessKey===currentSession&&currentStudent)renderDetail(currentStudent);
        },err=>console.warn('读取作文数据失败',err));
      }
    });
  }catch(e){
    document.getElementById('loadingTip').textContent='连接出错：'+e.message;
  }
}
attachListener();
</script>

</body>
</html>
