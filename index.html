<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作练习 · 教师后台</title>
<style>
:root{
  --plum-900:#3b2454;
  --plum-700:#5e3a86;
  --plum-600:#724aa3;
  --plum-500:#8b63c2;
  --plum-400:#a685d4;
  --plum-200:#d8c7ee;
  --plum-100:#ece2f8;
  --plum-50:#f6f1fc;
  --lilac:#efe7fb;
  --paper:#fbf9fe;
  --ink:#2c2435;
  --ink-soft:#5b5168;
  --accent-rose:#c0568a;
  --accent-amber:#d8932f;
  --accent-teal:#3f9d92;
  --line:#e4d9f2;
  --shadow:0 10px 40px -18px rgba(91,58,134,.45);
  --shadow-sm:0 4px 18px -10px rgba(91,58,134,.4);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(circle at 12% 8%, #f0e6fb 0%, transparent 42%),
    radial-gradient(circle at 88% 18%, #f7eefb 0%, transparent 40%),
    var(--paper);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
header.top{
  position:sticky;top:0;z-index:20;
  background:rgba(251,249,254,.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.top-inner{max-width:1080px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.brand{font-weight:800;font-size:1.05rem;color:var(--plum-700);display:flex;align-items:center;gap:10px;white-space:nowrap;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--plum-500),var(--accent-rose));}
.livedot{width:8px;height:8px;border-radius:50%;background:var(--accent-teal);margin-left:auto;flex:none;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.livelabel{font-size:.8rem;color:var(--ink-soft);}

.session-nav{display:flex;gap:8px;}
.session-tab{background:none;border:1px solid var(--line);border-radius:999px;padding:6px 18px;font-size:.85rem;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:"Noto Sans SC",sans-serif;transition:.15s;}
.session-tab:hover{background:var(--plum-50);}
.session-tab.active{background:var(--plum-600);color:#fff;border-color:var(--plum-600);}

.wrap{max-width:1080px;margin:0 auto;padding:26px;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);}
.stat-card .num{font-size:1.7rem;font-weight:800;color:var(--plum-700);}
.stat-card .lbl{font-size:.8rem;color:var(--ink-soft);margin-top:2px;}

.search-row{display:flex;gap:10px;margin-bottom:18px;}
#searchInput{flex:1;padding:11px 16px;border:1px solid var(--line);border-radius:999px;font-size:.92rem;outline:none;background:#fff;}
#searchInput:focus{border-color:var(--plum-500);}

.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.student-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s;}
.student-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.student-card .name{font-weight:800;font-size:1.02rem;color:var(--plum-900);margin-bottom:8px;}
.student-card .meta{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--ink-soft);}
.badge{font-weight:800;padding:3px 10px;border-radius:999px;font-size:.82rem;}
.badge.good{background:#e3f3ef;color:var(--accent-teal);}
.badge.mid{background:#faf0de;color:var(--accent-amber);}
.badge.low{background:#f8e9ef;color:var(--accent-rose);}
.badge.neutral{background:var(--plum-100);color:var(--plum-700);}
.student-card .recent{margin-top:6px;font-size:.76rem;color:var(--ink-soft);}

.empty{text-align:center;padding:60px 0;color:var(--ink-soft);}

#detailView{display:none;}
.back-btn{background:none;border:1px solid var(--line);border-radius:999px;padding:8px 18px;font-size:.85rem;color:var(--plum-700);cursor:pointer;margin-bottom:18px;font-weight:700;}
.back-btn:hover{background:var(--plum-50);}
.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.detail-head h2{color:var(--plum-900);font-size:1.3rem;}
.detail-stats{display:flex;gap:18px;font-size:.86rem;color:var(--ink-soft);}
.detail-stats b{color:var(--plum-700);}

.attempt{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.attempt-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:12px;}
.attempt-head:hover{background:var(--plum-50);}
.attempt-ex{font-weight:700;color:var(--plum-700);font-size:.9rem;}
.attempt-time{font-size:.78rem;color:var(--ink-soft);}
.attempt-score{font-weight:800;font-size:.88rem;flex:none;}
.attempt-body{display:none;padding:0 16px 14px;border-top:1px solid var(--line);}
.attempt.open .attempt-body{display:block;}
.wrong-item{padding:10px 0;border-bottom:1px dashed var(--line);font-size:.85rem;}
.wrong-item:last-child{border-bottom:none;}
.wrong-item .q{color:var(--ink);margin-bottom:4px;}
.wrong-item .ans-row{display:flex;gap:16px;flex-wrap:wrap;}
.wrong-item .ans-row span{font-size:.82rem;}
.wrong-item .stu{color:var(--accent-rose);}
.wrong-item .corr{color:var(--accent-teal);font-style:italic;}
.no-wrong{padding:14px 0;color:var(--accent-teal);font-size:.86rem;font-weight:700;}
.sentence-block{padding:12px 0;}
.sentence-block .sline{font-size:.85rem;margin-bottom:8px;line-height:1.6;}
.sentence-block .sline b{color:var(--ink-soft);font-weight:700;margin-right:2px;}
.sentence-block .stu{color:var(--accent-rose);}
.sentence-block .corr{color:var(--accent-teal);font-style:italic;}

.loading{text-align:center;padding:60px 0;color:var(--ink-soft);}

.login-screen{position:fixed;inset:0;background:
    radial-gradient(circle at 12% 8%, #f0e6fb 0%, transparent 42%),
    radial-gradient(circle at 88% 18%, #f7eefb 0%, transparent 40%),
    var(--paper);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
.login-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 32px;max-width:360px;width:100%;}
.login-box h2{color:var(--plum-700);font-size:1.2rem;margin-bottom:6px;text-align:center;}
.login-box p{color:var(--ink-soft);font-size:.85rem;text-align:center;margin-bottom:22px;}
.login-box input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:.92rem;margin-bottom:12px;outline:none;box-sizing:border-box;}
.login-box input:focus{border-color:var(--plum-500);}
.login-err{color:var(--accent-rose);font-size:.8rem;min-height:1.1em;margin-bottom:10px;text-align:center;}
.login-btn{width:100%;background:var(--plum-600);color:#fff;border:none;border-radius:999px;padding:11px;font-weight:700;font-size:.92rem;cursor:pointer;font-family:"Noto Sans SC",sans-serif;}
.login-btn:hover{filter:brightness(1.08);}
.login-btn:disabled{opacity:.6;cursor:default;}
.logout-btn{background:none;border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:.78rem;color:var(--ink-soft);cursor:pointer;font-family:"Noto Sans SC",sans-serif;}
.logout-btn:hover{background:var(--plum-50);}
</style>
</head>
<body>

<!-- ===== 登录界面 ===== -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>教师后台登录</h2>
    <p>请输入账号密码查看学生练习数据</p>
    <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">登录</button>
  </div>
</div>

<div id="appShell" style="display:none;">
<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="dot"></span>写作练习 · 教师后台</div>
    <div class="session-nav" id="sessionNav">
      <button class="session-tab active" data-session="s1">S1</button>
      <button class="session-tab" data-session="s2">S2</button>
      <button class="session-tab" data-session="s3">S3</button>
    </div>
    <span class="livedot"></span><span class="livelabel">实时同步中</span>
    <button class="logout-btn" id="logoutBtn">退出登录</button>
  </div>
</header>

<div class="wrap">

  <div id="listView">
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="statStudents">0</div><div class="lbl">练习学生数</div></div>
      <div class="stat-card"><div class="num" id="statAttempts">0</div><div class="lbl">总练习次数</div></div>
      <div class="stat-card"><div class="num" id="statAccuracy">0%</div><div class="lbl">本session平均正确率</div></div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="🔍 搜索学生姓名">
    </div>

    <div id="loadingTip" class="loading">正在连接数据库…</div>
    <div id="studentList" class="student-grid"></div>
    <div id="emptyState" class="empty" style="display:none">暂无学生练习数据，等学生开始做练习后会自动出现在这里</div>
  </div>

  <div id="detailView">
    <button class="back-btn" id="backBtn">← 返回学生列表</button>
    <div class="detail-head">
      <h2 id="detailName"></h2>
      <div class="detail-stats">
        <span>练习次数：<b id="detailCount"></b></span>
        <span>总体正确率：<b id="detailAcc"></b></span>
      </div>
    </div>
    <div id="attemptList"></div>
  </div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script>
try{
  firebase.initializeApp({
    apiKey: "AIzaSyBelnbI82VEjA9Q-74pczGuH5LoSBDxJzw",
    authDomain: "s1-writing.firebaseapp.com",
    databaseURL: "https://s1-writing-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "s1-writing",
    storageBucket: "s1-writing.firebasestorage.app",
    messagingSenderId: "715593483825",
    appId: "1:715593483825:web:5bd4d0cf8568c1e28ff710"
  });
}catch(e){console.warn('Firebase init failed',e);}
</script>

<script>
const SESSION_CONFIG={
  s1:{
    path:'s1_attempts',
    exLabel:a=>{
      const M={
        ex1_up:'练习1 · 上升类动词',
        ex1_down:'练习1 · 下降类动词',
        ex1_other:'练习1 · 其他趋势动词',
        ex2_sort:'练习2 · 词性归类',
        ex3:'练习3 · 选择正确词性',
        ex4:'练习4 · 时态填空'
      };
      if(a.exercise==='ex5')return '练习5 · 句式转换 · 第'+((a.idx!=null?a.idx:0)+1)+'句';
      return M[a.exercise]||a.exercise;
    }
  },
  s2:{
    path:'s2_attempts',
    exLabel:a=>{
      const M={
        fill_reach:'词汇 · 达到某个数值',
        fill_rise_to:'词汇 · 上升至某个数值',
        fill_fall_to:'词汇 · 下降至某个数值',
        fill_by:'词汇 · 变化了某个幅度',
        fill_exceed:'词汇 · 超过/低于',
        fill_approx:'词汇 · 大约/接近',
        fill_s2_gA:'S2练习A · 起点描述',
        fill_s2_gB:'S2练习B · 终点描述',
        fill_s2_gC:'S2练习C · 起点终点最高最低',
        fill_s2_gD:'S2练习D · 整体变化描述',
        sort_idea1:'排序 · Idea1例句重组'
      };
      return M[a.exercise]||a.exercise;
    }
  },
  s3:{
    path:'s3_attempts',
    exLabel:a=>{
      const M={
        'vex-t3main':'Pie Chart主体段 · 综合填空',
        'vex-a':'表达填空（超过/明显/占比等）',
        'vex-b':'That of 句式改写',
        'vex-c':'词汇精准选择（饼图 vs 柱状图）',
        'vex-d':'程度词与一致性填空',
        'vex-e':'数字自然衔接句式转换',
        'bp2_reorder':'主体段思路 · BP2句子重组',
        'conclusion_quiz':'结尾段 · 最佳结尾选择'
      };
      return M[a.exercise]||a.exercise;
    }
  }
};

let SESSION_DATA={s1:{},s2:{},s3:{}};
let currentSession='s1';
let currentStudent=null;

const accClass=p=>p>=80?'good':(p>=50?'mid':'low');

const overall=attempts=>{
  let c=0,t=0;
  attempts.forEach(a=>{c+=(a.correct||0);t+=(a.total||0);});
  return t?Math.round(c/t*100):0;
};

function renderStats(){
  const data=SESSION_DATA[currentSession];
  const names=Object.keys(data);
  let totalAttempts=0,c=0,t=0;
  names.forEach(n=>{
    data[n].forEach(a=>{totalAttempts++;c+=(a.correct||0);t+=(a.total||0);});
  });
  document.getElementById('statStudents').textContent=names.length;
  document.getElementById('statAttempts').textContent=totalAttempts;
  document.getElementById('statAccuracy').textContent=(t?Math.round(c/t*100):0)+'%';
}

function renderList(filter){
  filter=(filter||'').trim();
  const data=SESSION_DATA[currentSession];
  const container=document.getElementById('studentList');
  const empty=document.getElementById('emptyState');
  const names=Object.keys(data).filter(n=>n.includes(filter));
  container.innerHTML='';
  if(names.length===0){
    empty.style.display='block';
    empty.textContent=Object.keys(data).length===0?'暂无学生练习数据，等学生开始做练习后会自动出现在这里':'没有匹配的学生姓名';
    return;
  }
  empty.style.display='none';
  names.sort((a,b)=>{
    const la=data[a][0]?data[a][0].ts||0:0;
    const lb=data[b][0]?data[b][0].ts||0:0;
    return lb-la;
  });
  names.forEach(n=>{
    const attempts=data[n];
    const acc=overall(attempts);
    const last=attempts[0];
    const card=document.createElement('div');
    card.className='student-card';
    card.innerHTML=`
      <div class="name">${n}</div>
      <div class="meta">
        <span>练习 ${attempts.length} 次</span>
        <span class="badge ${accClass(acc)}">${acc}%</span>
      </div>
      <div class="recent">最近一次：${last&&last.dateStr?last.dateStr:'-'}</div>
    `;
    card.addEventListener('click',()=>openDetail(n));
    container.appendChild(card);
  });
}

function openDetail(name){
  currentStudent=name;
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  renderDetail(name);
}

function renderDetail(name){
  const attempts=SESSION_DATA[currentSession][name]||[];
  document.getElementById('detailName').textContent=name;
  document.getElementById('detailCount').textContent=attempts.length;
  document.getElementById('detailAcc').textContent=overall(attempts)+'%';
  const list=document.getElementById('attemptList');
  list.innerHTML='';
  const exLabel=SESSION_CONFIG[currentSession].exLabel;
  attempts.forEach((a)=>{
    const isUngraded=a.type==='ungraded';
    const wrap=document.createElement('div');
    wrap.className='attempt';
    let scoreHtml,bodyHtml;
    if(isUngraded){
      scoreHtml=`<div class="attempt-score badge neutral">已完成</div>`;
      bodyHtml=`
        <div class="sentence-block">
          <div class="sline"><b>原句：</b>${(a.prompt||'').replace(/</g,'&lt;')}</div>
          <div class="sline stu"><b>学生改写：</b>${(a.studentAnswer||'(空)').replace(/</g,'&lt;')}</div>
          <div class="sline corr"><b>参考答案：</b>${(a.referenceAnswer||'').replace(/</g,'&lt;')}</div>
        </div>`;
    }else{
      const wrong=a.wrong||[];
      const acc=a.total?Math.round((a.correct/a.total)*100):0;
      scoreHtml=`<div class="attempt-score badge ${accClass(acc)}">${a.correct}/${a.total} · ${acc}%</div>`;
      bodyHtml=wrong.length
        ? wrong.map(w=>`
            <div class="wrong-item">
              <div class="q">${(w.question||'').replace(/</g,'&lt;')}</div>
              <div class="ans-row">
                <span class="stu">学生答案：${(w.studentAnswer||'(空)').replace(/</g,'&lt;')}</span>
                <span class="corr">正确答案：${(w.correctAnswer||'').replace(/</g,'&lt;')}</span>
              </div>
            </div>`).join('')
        : '<div class="no-wrong">✓ 本次全部正确，没有错题</div>';
    }
    wrap.innerHTML=`
      <div class="attempt-head">
        <div>
          <div class="attempt-ex">${exLabel(a)}</div>
          <div class="attempt-time">${a.dateStr||''}</div>
        </div>
        ${scoreHtml}
      </div>
      <div class="attempt-body">${bodyHtml}</div>
    `;
    wrap.querySelector('.attempt-head').addEventListener('click',()=>wrap.classList.toggle('open'));
    list.appendChild(wrap);
  });
}

document.getElementById('backBtn').addEventListener('click',()=>{
  currentStudent=null;
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='block';
});

document.getElementById('searchInput').addEventListener('input',e=>renderList(e.target.value));

document.querySelectorAll('.session-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.dataset.session===currentSession)return;
    currentSession=btn.dataset.session;
    document.querySelectorAll('.session-tab').forEach(b=>b.classList.toggle('active',b===btn));
    currentStudent=null;
    document.getElementById('detailView').style.display='none';
    document.getElementById('listView').style.display='block';
    document.getElementById('searchInput').value='';
    renderStats();
    renderList('');
  });
});

function attachListener(){
  try{
    if(typeof firebase==='undefined'||!firebase.apps||!firebase.apps.length){
      document.getElementById('loadingTip').textContent='Firebase 未能初始化，请检查网络连接';
      return;
    }
    Object.keys(SESSION_CONFIG).forEach(sessKey=>{
      const path=SESSION_CONFIG[sessKey].path;
      firebase.database().ref(path).on('value',snap=>{
        const val=snap.val()||{};
        const data={};
        Object.keys(val).forEach(key=>{
          const raw=val[key]||{};
          const attempts=Object.values(raw).sort((x,y)=>(y.ts||0)-(x.ts||0));
          const displayName=(attempts[0]&&attempts[0].name)?attempts[0].name:key;
          data[displayName]=attempts;
        });
        SESSION_DATA[sessKey]=data;
        document.getElementById('loadingTip').style.display='none';
        if(sessKey===currentSession){
          renderStats();
          renderList(document.getElementById('searchInput').value);
          if(currentStudent&&SESSION_DATA[currentSession][currentStudent])renderDetail(currentStudent);
        }
      },err=>{
        document.getElementById('loadingTip').textContent='读取数据失败：'+err.message;
      });
    });
  }catch(e){
    document.getElementById('loadingTip').textContent='连接出错：'+e.message;
  }
}
// ===== 登录逻辑 =====
const loginBtn=document.getElementById('loginBtn');
const loginEmail=document.getElementById('loginEmail');
const loginPassword=document.getElementById('loginPassword');
const loginErr=document.getElementById('loginErr');
const logoutBtn=document.getElementById('logoutBtn');
let listenersAttached=false;

function doLogin(){
  const email=loginEmail.value.trim();
  const pw=loginPassword.value;
  if(!email||!pw){loginErr.textContent='请输入邮箱和密码';return;}
  loginErr.textContent='';
  loginBtn.disabled=true;
  loginBtn.textContent='登录中…';
  firebase.auth().signInWithEmailAndPassword(email,pw)
    .catch(err=>{ loginErr.textContent='登录失败：'+(err.message||'账号或密码错误'); })
    .finally(()=>{ loginBtn.disabled=false; loginBtn.textContent='登录'; });
}
loginBtn.addEventListener('click',doLogin);
loginPassword.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
loginEmail.addEventListener('keydown',e=>{if(e.key==='Enter')loginPassword.focus();});

logoutBtn.addEventListener('click',()=>{ firebase.auth().signOut(); });

if(typeof firebase!=='undefined' && firebase.apps && firebase.apps.length){
  firebase.auth().onAuthStateChanged(user=>{
    if(user){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appShell').style.display='block';
      if(!listenersAttached){ listenersAttached=true; attachListener(); }
    }else{
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('appShell').style.display='none';
    }
  });
}else{
  loginErr.textContent='Firebase 未能初始化，请检查网络连接';
}
</script>

</body>
</html>
